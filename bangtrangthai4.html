<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Thôi Miên</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f23;color:#e0e0e0;font-family:'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:64px;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;border-right:1px solid #2a2a4a}
.tab{width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;font-size:20px;transition:all .2s}
.tab span:last-child{font-size:8px;margin-top:2px}
.tab.active{background:#6366f1}
.tab:hover{background:#3a3a5a}
#main{flex:1;overflow-y:auto;padding:16px}
.card{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #2a2a4a}
.card-title{font-size:16px;font-weight:bold;margin-bottom:12px;color:#a5b4fc}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.stat-box{background:#0f0f23;padding:12px;border-radius:8px}
.stat-label{font-size:11px;color:#888}
.stat-value{font-size:18px;font-weight:bold;margin-top:4px}
.bar-wrap{height:6px;background:#2a2a4a;border-radius:3px;overflow:hidden;margin-top:4px}
.bar{height:100%;border-radius:3px;transition:width .5s}
.role-card{background:#1a1a2e;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #2a2a4a}
.stat-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px}
.feat-card{background:#1a1a2e;border-radius:12px;padding:16px;cursor:pointer;border:1px solid #2a2a4a;transition:all .2s}
.feat-card:hover{border-color:#6366f1}
.empty{text-align:center;padding:32px;color:#888}
.empty-icon{font-size:48px;margin-bottom:12px}
.loading{display:flex;align-items:center;justify-content:center;height:100%}
.badge{padding:2px 8px;border-radius:12px;font-size:11px}
.quest-item{background:#0f0f23;padding:16px;border-radius:8px;margin-bottom:8px;border-left:4px solid #6366f1}
.event-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #2a2a4a}
.inv-card{background:#0f0f23;padding:12px;border-radius:8px;border:1px solid #2a2a4a}
.help-item{margin-bottom:16px}
.help-title{font-weight:bold;margin-bottom:4px}
.help-desc{font-size:13px;color:#888}
</style>
</head>
<body>
<div id="sidebar">
<div class="tab active" data-tab="status" onclick="switchTab('status')"><span>📊</span><span>Trạng thái</span></div>
<div class="tab" data-tab="hypno" onclick="switchTab('hypno')"><span>🌀</span><span>Thôi Miên</span></div>
<div class="tab" data-tab="calendar" onclick="switchTab('calendar')"><span>📅</span><span>Lịch</span></div>
<div class="tab" data-tab="quests" onclick="switchTab('quests')"><span>🏆</span><span>Nhiệm vụ</span></div>
<div class="tab" data-tab="inventory" onclick="switchTab('inventory')"><span>🎒</span><span>Kho đồ</span></div>
<div class="tab" data-tab="help" onclick="switchTab('help')"><span>❓</span><span>Trợ giúp</span></div>
</div>
<div id="main"></div>
<script>
(function(){
var data={sys:{},roles:{},tasks:{},inv:{}};
var currentTab='status';

function getMvu(){return new Promise(function(r){var c=function(){if(window.Mvu)r(window.Mvu);else setTimeout(c,200)};c()})}
function getVal(p){var v=data.sys;if(!v)return null;var s=p.split('.');for(var i=0;i<s.length;i++){if(v==null)return null;v=v[s[i]]}return v}
function getRoleStat(name,key){var r=data.roles[name];if(!r||typeof r==='string')return 0;return r[key]||0}
function bar(v,mx,cl){v=v||0;mx=mx||100;return '<div class="bar-wrap"><div class="bar" style="width:'+Math.min(100,(v/mx)*100)+'%;background:'+cl+'"></div></div>'}
function statBox(label,value,color){return '<div class="stat-box"><div class="stat-label">'+label+'</div><div class="stat-value" style="color:'+(color||'#e0e0e0')+'">'+value+'</div></div>'}

function renderStatus(){
var h='<div class="card"><div class="card-title">📱 Hệ thống</div><div class="grid">';
h+=statBox('📅 Ngày hiện tại',getVal('ngày_hiện_tại')||'--');
h+=statBox('⏰ Thời gian',getVal('thời_gian_hiện_tại')||'--');
h+=statBox('📋 Lịch trình',getVal('lịch_trình_hiện_tại')||'--');
h+=statBox('⚡ Năng lượng MC',(getVal('_năng_lượng_mc')||0)+'/'+(getVal('_giới_hạn_năng_lượng_mc')||100),'#fbbf24');
h+=statBox('💰 Điểm MC',getVal('điểm_mc_hiện_tại')||0,'#34d399');
h+=statBox('🔍 Độ khả nghi',(getVal('độ_khả_nghi_của_nhân_vật_chính')||0)+'%','#f87171');
h+=statBox('💴 Tiền',(getVal('tiền_tiêu_vặt_đang_có')||0).toLocaleString()+' ¥');
h+='</div></div>';

var names=Object.keys(data.roles||{});
for(var n=0;n<names.length;n++){
var nm=names[n];
h+='<div class="role-card"><div class="card-title">👤 '+nm+'</div>';
h+='<div class="grid">';
var stats=[['Độ cảnh giác','độ_cảnh_giác','#ef4444'],['Độ phục tùng','độ_phục_tùng','#3b82f6'],['Độ hảo cảm','độ_hảo_cảm','#ec4899'],['Dục vọng','dục_vọng','#f97316'],['Chỉ số khoái cảm','chỉ_số_khoái_cảm','#a855f7']];
for(var s=0;s<stats.length;s++){var st=stats[s];var val=getRoleStat(nm,st[1]);h+='<div class="stat-box"><div class="stat-row"><span>'+st[0]+'</span><span>'+val+'</span></div>'+bar(val,100,st[2])+'</div>'}
h+='</div>';
h+='<div style="margin-top:12px;font-size:13px;color:#888">Độ nhạy cảm:</div><div class="grid" style="margin-top:4px">';
var sens=[['Âm vật','độ_nhạy_cảm_âm_vật','#f472b6'],['Tiểu huyệt','độ_nhạy_cảm_tiểu_huyệt','#fb7185'],['Cúc huyệt','độ_nhạy_cảm_cúc_huyệt','#fda4af'],['Niệu đạo','độ_nhạy_cảm_niệu_đạo','#f9a8d4'],['Nhũ hoa','độ_nhạy_cảm_nhũ_hoa','#fbcfe8']];
for(var s=0;s<sens.length;s++){var se=sens[s];var val2=getRoleStat(nm,se[1]);h+='<div class="stat-box"><div class="stat-row"><span>'+se[0]+'</span><span>'+val2+'</span></div>'+bar(val2,100,se[2])+'</div>'}
h+='</div>';
h+='<div style="margin-top:12px;font-size:13px;color:#888">Số lần lên đỉnh:</div><div style="display:flex;gap:12px;margin-top:4px;flex-wrap:wrap">';
var clim=[['Âm vật','số_lần_lên_đỉnh_âm_vật'],['Tiểu huyệt','số_lần_lên_đỉnh_tiểu_huyệt'],['Cúc huyệt','số_lần_lên_đỉnh_cúc_huyệt'],['Niệu đạo','số_lần_lên_đỉnh_niệu_đạo'],['Nhũ hoa','số_lần_lên_đỉnh_nhũ_hoa']];
for(var c=0;c<clim.length;c++){var cl=clim[c];h+='<div style="background:#0f0f23;padding:8px 12px;border-radius:8px;font-size:12px">'+cl[0]+': <b>'+getRoleStat(nm,cl[1])+'</b></div>'}
h+='</div></div>'}
if(!names.length)h+='<div class="empty"><div class="empty-icon">👤</div><div>Chưa có dữ liệu nhân vật</div></div>';
return h}

function renderHypno(){
var tier=getVal('_cấp_độ_đăng_ký_app_thôi_miên')||'Chưa đăng ký';
var e=getVal('_năng_lượng_mc')||0;var em=getVal('_giới_hạn_năng_lượng_mc')||100;var mc=getVal('điểm_mc_hiện_tại')||0;
var h='<div style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:16px;padding:24px;margin-bottom:16px;text-align:center">';
h+='<div style="font-size:48px;margin-bottom:8px">🌀</div><div style="font-size:24px;font-weight:bold">App Thôi Miên</div>';
h+='<div style="font-size:14px;opacity:0.8;margin-top:4px">Gói hiện tại: '+tier+'</div>';
h+='<div style="display:flex;justify-content:center;gap:24px;margin-top:16px">';
h+='<div><div style="font-size:24px;font-weight:bold">'+e+'/'+em+'</div><div style="font-size:11px;opacity:0.7">⚡ Năng lượng</div></div>';
h+='<div><div style="font-size:24px;font-weight:bold">'+mc+'</div><div style="font-size:11px;opacity:0.7">💰 Điểm MC</div></div>';
h+='</div></div>';
var feats=[['Thuốc nói thật','VIP1',5],['Tăng nhạy cảm','VIP2',8],['Phát tình','VIP2',10],['Ban khoái cảm','VIP2',6],['Xóa ký ức','VIP3',15],['Bàn tay vô hình','VIP3',12],['Cố định身体','VIP3',10],['Chuyển đổi痛觉','VIP4',20],['Cưỡng chế高潮','VIP4',25],['Bộ đồ Hoàng đế','VIP5',30],['Cấy ghép人格','VIP6',50]];
h+='<div class="grid">';
for(var i=0;i<feats.length;i++){var f=feats[i];
h+='<div class="feat-card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:bold">'+f[0]+'</div><span class="badge" style="background:#6366f1">'+f[1]+'</span></div><div style="font-size:12px;color:#fbbf24;margin-top:4px">'+f[2]+' MC</div></div>'}
h+='</div>';return h}

function renderCalendar(){
var day=getVal('ngày_hiện_tại')||'--';var sch=getVal('lịch_trình_hiện_tại')||'--';
var h='<div class="card"><div class="card-title">📅 Lịch</div><div class="grid">';
h+=statBox('📅 Ngày',day);h+=statBox('📋 Lịch trình',sch);
h+='</div></div>';
var evts=[['Lễ','Tân Niên','Tháng 1'],['Lễ','Ngày Thành Nhân','Tháng 1'],['Lễ','Ngày Quốc Khánh','Tháng 2'],['Sự kiện','Setsubun','Tháng 2'],['Lễ','Ngày Xuân Phân','Tháng 3'],['Sự kiện','Lễ nhập học/Khai giảng','Tháng 4'],['Sự kiện','Tuần tuyển quân CLB','Tháng 4'],['Học tập','Thi giữa kỳ Học kỳ 1','Tháng 5'],['Lễ','Ngày Biển','Tháng 7'],['Sự kiện','Bắt đầu nghỉ hè','Tháng 7'],['Sự kiện','Comiket Hè','Tháng 8'],['Lễ','Ngày Kính Lão','Tháng 9'],['Sự kiện','Hội thao','Tháng 9'],['Lễ','Ngày Thể Thao','Tháng 10'],['Sự kiện','Lễ hội Văn hóa','Tháng 10'],['Lễ','Ngày Văn Hóa','Tháng 11'],['Lễ','Sinh Nhật Thiên Hoàng','Tháng 12'],['Lễ','Đêm Giáng Sinh','Tháng 12'],['Lễ','Giáng Sinh','Tháng 12'],['Lễ','Đêm Giao Thừa','Tháng 12']];
h+='<div class="card"><div class="card-title">🗓️ Sự kiện trong năm</div>';
for(var i=0;i<evts.length;i++){var e=evts[i];
h+='<div class="event-row"><span style="background:'+(e[0]==='Lễ'?'#ef4444':'#3b82f6')+';padding:2px 8px;border-radius:8px;font-size:11px;min-width:60px;text-align:center">'+e[0]+'</span><span style="font-weight:bold">'+e[1]+'</span><span style="color:#888;font-size:12px">'+e[2]+'</span></div>'}
h+='</div>';return h}

function renderQuests(){
var t=data.tasks;var keys=Object.keys(t||{});
var h='<div class="card"><div class="card-title">🏆 Nhiệm vụ</div>';
if(!keys.length)h+='<div class="empty"><div class="empty-icon">📋</div><div>Chưa có nhiệm vụ</div></div>';
for(var i=0;i<keys.length;i++){var k=keys[i];var v=t[k];
h+='<div class="quest-item"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:bold">'+k+'</div><span style="background:'+(v.đã_hoàn_thành?'#22c55e':'#f59e0b')+';padding:2px 8px;border-radius:8px;font-size:11px">'+(v.đã_hoàn_thành?'Đã hoàn thành':'Đang làm')+'</span></div><div style="font-size:13px;color:#888;margin-top:4px">'+(v.điều_kiện_hoàn_thành||'--')+'</div></div>'}
h+='</div>';return h}

function renderInventory(){
var items=Object.keys(data.inv||{});
var h='<div class="card"><div class="card-title">🎒 Kho đồ</div>';
if(!items.length)h+='<div class="empty"><div class="empty-icon">📦</div><div>Chưa có vật phẩm</div></div>';
h+='<div class="grid">';
for(var i=0;i<items.length;i++){var k=items[i];var v=data.inv[k];
h+='<div class="inv-card"><div style="font-weight:bold">'+k+'</div><div style="font-size:12px;color:#888;margin-top:4px">'+(v.mô_tả||'--')+'</div><div style="font-size:14px;font-weight:bold;color:#fbbf24;margin-top:4px">x'+(v.số_lượng||0)+'</div></div>'}
h+='</div></div>';return h}

function renderHelp(){
return '<div class="card"><div class="card-title">❓ Trợ giúp</div>'+
'<div class="help-item"><div class="help-title">📱 App Thôi Miên</div><div class="help-desc">Ứng dụng mô phỏng với cơ chế thôi miên. Nâng cấp VIP để mở khóa更多 tính năng.</div></div>'+
'<div class="help-item"><div class="help-title">⚡ Năng lượng MC</div><div class="help-desc">Năng lượng用于 sử dụng các tính năng. Hồi phục 50% mỗi ngày. Có thể mua thêm bằng điểm MC.</div></div>'+
'<div class="help-item"><div class="help-title">🔍 Độ khả nghi</div><div class="help-desc">Mức độ bị phát hiện. Giữ dưới 5% để tránh bị phát hiện. Giảm 10 điểm mỗi ngày.</div></div>'+
'<div class="help-item"><div class="help-title">🎯 Nhiệm vụ</div><div class="help-desc">Hoàn thành nhiệm vụ để nhận điểm MC. Mỗi nhiệm vụ có điều kiện riêng.</div></div>'+
'<div class="help-item"><div class="help-title">💰 Điểm MC</div><div class="help-desc">Điểm用于 mua năng lượng, nâng cấp VIP, và sử dụng tính năng.</div></div></div>'}

function render(){
var main=document.getElementById('main');
var renderers={status:renderStatus,hypno:renderHypno,calendar:renderCalendar,quests:renderQuests,inventory:renderInventory,help:renderHelp};
main.innerHTML=(renderers[currentTab]||renderStatus)()}

window.switchTab=function(tab){
currentTab=tab;
var tabs=document.querySelectorAll('.tab');
for(var i=0;i<tabs.length;i++){tabs[i].className=tabs[i].dataset.tab===tab?'tab active':'tab'}
render()};

async function refresh(){
try{
var mvu=await getMvu();
var d=await mvu.getMvuData({type:'message',message_id:'latest'});
if(d){
data.sys=d.stat_data?.hệ_thống||d.stat_data?.系统||{};
data.roles=d.stat_data?.nhân_vật||d.stat_data?.角色||{};
data.tasks=d.stat_data?.nhiệm_vụ||d.stat_data?.任务||{};
data.inv=d.stat_data?.hệ_thống?.vật_phẩm_đang_có||d.stat_data?.系统?.持有物品||{}}
render()}catch(e){document.getElementById('main').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div>Lỗi: '+e.message+'</div><button onclick="refresh()" style="margin-top:8px;padding:8px 16px;background:#6366f1;border:none;color:white;border-radius:8px;cursor:pointer">Thử lại</button></div>'}}

refresh();setInterval(refresh,10000);
console.info('[HypnoOS] Giao diện bảng trạng thái đã tải');
})();
</script>
</body>
